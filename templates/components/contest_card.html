{% if submission %}
<style>
    .contest-card {
        transition: all 0.3s ease;
    }

    .contest-card:hover {
        transform: scale(1.05) rotate(calc(var(--rotation) * 1deg));
        box-shadow: 0 20px 80px rgba(211, 214, 140, 0.4);
    }

    .mii-thumbnail {
        width: 128px;
        height: 128px;
        border-radius: 12px;
        object-fit: contain;
        background-color: #f3f4f6;
    }
</style>

<div class="contest-card rounded-3xl shadow-lg hover:shadow-2xl transition-all"
    onmouseenter="this.style.setProperty('--rotation', Math.floor(Math.random() * 6) - 3)"
    onmouseleave="this.style.setProperty('--rotation', 0)">
    <div class="p-2 rounded-3xl border-[5px] border-white bg-[rgb(76,130,163)] shadow-2xl">
        <div class="flex flex-row items-center justify-between mb-4">
        </div>
        <div class="mt-2 bg-white p-1 rounded-xl flex flex-row gap-5 items-center justify-between">
            <div class="flex-shrink-0">
                {% if submission.mii_image_url %}
                <img class="mii-thumbnail" alt="Mii" src="{{ submission.mii_image_url }}" />
                {% endif %}
            </div>
            <div class="flex-1 pr-4">
                <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-3 mb-2">
                    <img class="w-12 h-12 rounded-lg object-cover border-2 border-gray-300"
                        src="https://miicontestp.wii.rc24.xyz//assets/contest/{{ submission.contest_id }}/thumbnail.jpg"
                        alt="Contest thumbnail" />
                    <h1 class="text-2xl font-bold text-gray-800">{{ submission.english_name }}</h1>
                </div>
                <div class="flex justify-between gap-4 mt-2 text-lg text-gray-700">
                    {% if submission.likes %}
                    <span class="flex items-center gap-1"><img src="/static/icon/heart.svg" alt="Likes" class="w-7 h-7">
                        {{ submission.likes }}</span>
                    {% endif %}
                    {% if submission.rank %}
                    <span class="flex items-center gap-1"><img src="/static/icon/star.svg" alt="Rank" class="w-7 h-7">
                        Rank #{{ submission.rank }}</span>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endif %}
