{% set cover = namespace(url='', fallback='') %}
{% set cover_game = rec %}
{% include "components/game_cover_vars.html" %}
<button data-modal-open data-source="search" data-title="{{ rec.title_en }}" data-game-id="{{ rec.game_id }}"
    data-cover-url="{{ cover.url }}" data-cover-fallback="{{ cover.fallback }}"
    data-release-year="{{ rec.release_year or '' }}" data-release-month="{{ rec.release_month or '' }}"
    data-release-day="{{ rec.release_day or '' }}" data-genre="{{ rec.genre or '' }}"
    data-developer="{{ rec.developer or '' }}" data-publisher="{{ rec.publisher or '' }}"
    data-rating-type="{{ rec.rating_type or '' }}" data-rating-value="{{ rec.rating_value or '' }}"
    data-synopsis="{{ rec.synopsis_en or '' }}" {%- if rec.input_controls %}
    data-input-controls='{{ rec.input_controls | tojson }}' {% endif %} data-wifi-players="{{ rec.wifi_players or 0 }}"
    data-input-players="{{ rec.input_players or 0 }}"
    class="relative rounded-2xl border border-gray-700 bg-gray-800/80 shadow-xl overflow-hidden hover:border-gray-500 transition duration-200 text-left w-full">
    <div class="absolute inset-x-0 top-0 h-44 bg-center bg-cover blur-lg opacity-10"
        style="background-image: url('{{ cover.url }}'); -webkit-mask-image: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0)); mask-image: linear-gradient(to bottom, rgba(255,255,255,1), rgba(255,255,255,0));">
    </div>
    <div class="h-full flex flex-col justify-between relative p-6">
        <span>
            <div class="flex items-center justify-between gap-6">
                <span class="flex items-center gap-4">
                    <img src="{{ cover.url }}" alt="{{ rec.title_en }} Cover" data-fallback="{{ cover.fallback }}"
                        onerror="if (!this.dataset.tried && this.dataset.fallback) { this.dataset.tried = '1'; this.src = this.dataset.fallback; } else { var placeholder = document.createElement('div'); placeholder.className = 'w-24 h-32 bg-gray-700 rounded-lg flex-shrink-0'; this.parentNode.replaceChild(placeholder, this); }"
                        class="h-32 object-cover rounded-lg flex-shrink-0">
                    <span class="flex flex-col gap-3">
                        <div>
                            <h2 class="text-2xl font-bold text-white">{{ rec.title_en }}</h2>
                            <p class="text-sm text-gray-400 mt-1">{{ rec.game_id }}{% if rec.release_year %} • {{
                                rec.release_year }}{% endif %}</p>
                        </div>
                        <div class="flex flex-wrap items-center gap-2 text-xs text-gray-200">
                            {% if rec.rating_type and rec.rating_value %}<img src="/static/ratings/{{
                                rec.rating_type }}-{{ rec.rating_value }}.jpg" alt="Rating"
                                class="h-8 object-contain">{% endif %}
                            {% if rec.genre %}
                            {% set genres = rec.genre.split(',') %}
                            <span class="px-3 py-1 rounded-full bg-gray-900/60">
                                {% for genre in genres[:3] %}
                                {{ genre.strip().upper() }}{% if not loop.last %} | {% endif %}
                                {% endfor %}
                            </span>
                            {% endif %}
                            {% if rec.publisher %}<span class="px-3 py-1 rounded-full bg-gray-900/60">{{ rec.publisher
                                }}</span>{% endif %}
                        </div>
                    </span>
                </span>
                <div class="hidden"></div>
            </div>
        </span>
    </div>
</button>
