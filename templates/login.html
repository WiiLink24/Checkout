{% extends "generic/base.html" %}

{% block title %}
WiiLink Checkout | Login
{% endblock %}

{% block content %}
<div class="min-h-screen flex flex-col items-center justify-center px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <img src="/static/img/logo.png" alt="WiiLink Logo" class="h-20 mx-auto mb-10">

        <div class="relative group mb-8">
            <div class="relative bg-gray-800 rounded-xl shadow-xl overflow-hidden border border-gray-700 p-8">
                <div class="text-center mb-8">
                    <h2 class="text-xl font-bold text-white mb-2">Welcome to WiiLink Checkout</h2>
                    <p class="text-gray-300">Sign in with your WiiLink account for the best experience</p>
                </div>

                <div class="flex justify-center">
                    <a href="{{ url_for('oidc_auth.login') }}" class="w-full">
                        <button
                            class="w-full px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg transition duration-200 flex items-center justify-center text-base font-medium">
                            <img src="/static/icon/key-round.svg" alt="Wii Icon" class="w-5 h-5 invert mr-2" />
                            Log In with your WiiLink Account
                        </button>
                    </a>
                </div>
            </div>
        </div>

        <div class="mt-10 text-center">
            <p class="text-gray-400 text-sm">© 2026 WiiLink</p>
        </div>
    </div>
</div>
{% endblock %}
