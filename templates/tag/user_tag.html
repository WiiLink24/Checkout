<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ username }} - Wii Checkout Tag</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 1000px;
            height: 400px;
            background: linear-gradient(135deg, #1f1f23 0%, #3a3a40 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            padding: 0;
            margin: 0;
        }

        .tag {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(30, 30, 34, 0.94) 0%, rgba(55, 55, 60, 0.94) 100%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .tag-bg {
            position: absolute;
            inset: 0;
            opacity: 0.3;
            filter: blur(24px);
            transform: scale(1.08);
            z-index: 0;
        }

        .tag-content {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info h1 {
            font-size: 48px;
            color: #ffffff;
            margin: 0 0 8px 0;
            font-weight: 700;
        }

        .user-info p {
            font-size: 16px;
            color: #d1d1d8;
            letter-spacing: 1px;
            margin: 0;
        }

        .stats {
            text-align: right;
        }

        .stat-label {
            font-size: 12px;
            color: #ababba;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 36px;
            color: #f0f0f5;
            font-weight: 700;
        }

        .games-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .game-covers {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .game-cover {
            flex: 0 0 auto;
            width: 120px;
            height: 170px;
            border-radius: 6px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(220, 220, 230, 0.2);
        }

        .game-cover.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(90, 90, 100, 0.45);
            color: #d0d0db;
            font-size: 12px;
            font-weight: 500;
            padding: 10px;
            text-align: center;
        }

        .footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(190, 190, 200, 0.22);
            text-align: center;
            font-size: 11px;
            color: #a9a9b4;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="tag">
        <div class="tag-bg" data-bg-url="{{ tag_background_url }}"></div>
        <div class="tag-content">
            <div class="header">
                <div class="user-info">
                    <img src="{{ pfp }}" alt="{{ username }} Profile Picture" class="profile-pic"
                        style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
                    <span style="display:flex; flex-direction: column; gap: 4px;">
                        <h1>{{ username }}</h1>
                        <p>{{ formatted_code }}</p>
                    </span>
                </div>
                <div class="stats">
                    <div class="stat-label">Total Playtime</div>
                    <div class="stat-value">{{ playtime_text }}</div>
                </div>
            </div>

            <div class="games-section">
                <div class="game-covers">
                    {% for game in games %}
                    {% if game.cover_url %}
                    <img src="{{ game.cover_url }}" alt="{{ game.title }}" class="game-cover" {% if game.fallback_url
                        %}data-fallback="{{ game.fallback_url }}" {% endif %}
                        onerror="if (!this.dataset.tried && this.dataset.fallback) { this.dataset.tried = '1'; this.src = this.dataset.fallback; } else { var placeholder = document.createElement('div'); placeholder.className = 'game-cover placeholder'; this.parentNode.replaceChild(placeholder, this); }" />
                    {% else %}
                    <div class="game-cover placeholder">No Cover</div>
                    {% endif %}
                    {% endfor %}
                </div>
            </div>

            <div class="footer">
                Generated {{ generated_at }} • WiiLink Checkout
            </div>
        </div>
    </div>
    <script>
        const tagBg = document.querySelector('.tag-bg');
        const backgroundUrl = tagBg?.dataset.bgUrl;
        if (tagBg && backgroundUrl) {
            tagBg.style.backgroundImage = `url('${backgroundUrl}')`;
            tagBg.style.backgroundSize = 'cover';
            tagBg.style.backgroundPosition = 'center';
        }
    </script>
</body>

</html>
